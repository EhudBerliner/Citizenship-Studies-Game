<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#12234a">
  <link rel="manifest" href="manifest.json">
  <title>אזרחות — מילון וחידון</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:   #12234a;
      --navy2:  #1c3370;
      --gold:   #c9a227;
      --gold2:  #f0c94a;
      --bg:     #f5f3ee;
      --white:  #ffffff;
      --text:   #1a1a2e;
      --muted:  #6b7280;
      --border: #e2ddd5;
      --ok:     #1a7a4a;
      --ok-bg:  #e8f8ef;
      --err:    #b91c1c;
      --err-bg: #fef2f2;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(18,35,74,.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    #app-header {
      background: var(--navy);
      padding: 18px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .app-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.45rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: -.5px;
    }
    .app-title span { color: var(--gold); }

    #home-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .82rem;
      cursor: pointer;
      font-family: 'Heebo', sans-serif;
      transition: background .2s;
      display: none;
    }
    #home-btn:hover { background: rgba(255,255,255,.22); }

    #quiz-stat-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      font-size: .82rem;
      color: rgba(255,255,255,.7);
      margin-bottom: 6px;
    }
    #quiz-stat-bar.show { display: flex; }
    #quiz-progress-bar-wrap {
      background: rgba(255,255,255,.15);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      display: none;
    }
    #quiz-progress-bar {
      height: 100%;
      background: var(--gold2);
      border-radius: 4px;
      transition: width .4s ease;
      width: 0%;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-top: 10px;
    }
    .tab {
      flex: 1;
      padding: 11px;
      text-align: center;
      font-size: .95rem;
      font-weight: 500;
      color: rgba(255,255,255,.55);
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all .2s;
      background: none;
      border-top: none; border-left: none; border-right: none;
      font-family: 'Heebo', sans-serif;
    }
    .tab.active { color: var(--gold2); border-bottom-color: var(--gold2); }

    /* ── MAIN ── */
    #main { padding: 20px 16px; max-width: 560px; margin: 0 auto; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── LOADER ── */
    #loader {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      padding: 60px 20px; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BUTTONS ── */
    .chapter-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; background: var(--white);
      border: 2px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; font-size: 1rem; font-weight: 500;
      color: var(--text); cursor: pointer; text-align: right;
      font-family: 'Heebo', sans-serif; transition: all .18s; margin-bottom: 10px;
    }
    .chapter-btn:hover { border-color: var(--navy2); background: #eef2fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(18,35,74,.1); }
    .chapter-btn .icon { font-size: 1.3rem; flex-shrink: 0; }
    .chapter-btn .meta { font-size: .78rem; color: var(--muted); font-weight: 400; margin-top: 2px; }

    .primary-btn {
      display: block; width: 100%;
      background: var(--navy); color: var(--white);
      border: none; border-radius: var(--radius);
      padding: 15px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: 'Heebo', sans-serif;
      transition: background .18s, transform .12s;
      text-align: center; margin-top: 10px;
    }
    .primary-btn:hover { background: var(--navy2); }
    .primary-btn:active { transform: scale(.97); }
    .primary-btn.secondary { background: #e2ddd5; color: var(--navy); }
    .primary-btn.secondary:hover { background: #d4cfc7; }

    .section-label {
      font-size: .78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
    }

    /* ── DICTIONARY TOOLBAR ── */
    .dict-toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    #dict-search-wrap {
      display: flex; align-items: center; gap: 8px;
      flex: 1;
      background: var(--white); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 0 14px;
      transition: border-color .2s;
    }
    #dict-search-wrap:focus-within { border-color: var(--navy2); }
    #dict-search-wrap input {
      flex: 1; border: none; outline: none;
      padding: 11px 0; font-size: .93rem;
      font-family: 'Heebo', sans-serif;
      background: transparent; color: var(--text);
    }
    #clear-search {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: .9rem; padding: 4px; display: none;
    }
    .dict-icon-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      border-radius: 12px; border: 2px solid var(--border);
      background: var(--white); color: var(--navy);
      cursor: pointer; font-size: 1.05rem;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
    }
    .dict-icon-btn:hover { border-color: var(--navy2); background: #eef2fb; }
    .dict-icon-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); }

    /* ── FLASH CARD ── */
    #flash-card {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
      border-radius: var(--radius); padding: 20px;
      margin-bottom: 14px; color: white; text-align: center;
    }
    .flash-term {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--gold2); margin-bottom: 4px; min-height: 36px;
    }
    .flash-chapter { font-size: .75rem; color: rgba(255,255,255,.45); margin-bottom: 10px; }
    .flash-def {
      font-size: .9rem; line-height: 1.6;
      color: rgba(255,255,255,.85); display: none;
      text-align: right; border-top: 1px solid rgba(255,255,255,.2);
      padding-top: 12px; margin-top: 4px;
    }
    .flash-btns { display: flex; gap: 8px; margin-top: 14px; }
    .flash-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      font-family: 'Heebo', sans-serif; transition: opacity .15s;
    }
    .flash-btn:active { opacity: .8; }
    .flash-btn.draw   { background: var(--gold); color: var(--navy); }
    .flash-btn.reveal { background: rgba(255,255,255,.15); color: white; }

    /* ── CHAPTER (level 1) ── */
    .chapter-section { margin-bottom: 8px; }
    .chapter-header {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1rem; font-weight: 900;
      color: var(--white);
      padding: 11px 16px;
      background: var(--navy);
      border-radius: 10px;
      cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 3px 10px rgba(18,35,74,.22);
      user-select: none;
    }
    .chapter-header:hover { background: var(--navy2); }
    .chapter-header .ch-left { display: flex; align-items: center; gap: 10px; }
    .chapter-header .ch-count {
      font-size: .72rem; font-weight: 400;
      color: rgba(255,255,255,.5);
      background: rgba(255,255,255,.1);
      padding: 2px 8px; border-radius: 20px;
    }
    .chapter-header .ch-arrow {
      font-size: .75rem; color: var(--gold2);
      transition: transform .22s; flex-shrink: 0;
    }
    .chapter-header.open .ch-arrow { transform: rotate(180deg); }

    .chapter-body { display: none; padding: 6px 0 10px; }
    .chapter-body.open { display: block; }

    /* ── SUB-CHAPTER (level 2) ── */
    .sub-section { margin-bottom: 4px; }
    .sub-header {
      font-size: .88rem; font-weight: 700;
      color: var(--navy);
      padding: 9px 14px;
      background: var(--white);
      border-right: 4px solid var(--gold);
      border-radius: 8px;
      cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 3px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      user-select: none;
    }
    .sub-header:hover { background: #f0f4ff; }
    .sub-header .sub-left { display: flex; align-items: center; gap: 8px; }
    .sub-header .sub-count {
      font-size: .7rem; font-weight: 400; color: var(--muted);
    }
    .sub-header .sub-arrow {
      font-size: .65rem; color: var(--muted);
      transition: transform .2s; flex-shrink: 0;
    }
    .sub-header.open .sub-arrow { transform: rotate(180deg); }

    .sub-body { display: none; }
    .sub-body.open { display: block; }

    /* ── TERMS TABLE (level 3) ── */
    .terms-table {
      background: var(--white);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 4px;
    }
    .term-row {
      display: flex; align-items: stretch;
      border-bottom: 1px solid #f0ece7;
      transition: background .12s;
    }
    .term-row:last-child { border-bottom: none; }
    .term-row:hover { background: #f8f6f2; }
    .term-row.fav-only-hidden { display: none; }

    .term-cell-name {
      width: 38%; flex-shrink: 0;
      font-weight: 700; font-size: .88rem;
      color: var(--navy);
      padding: 11px 14px;
      border-left: 1px solid #f0ece7;
      display: flex; align-items: center;
      line-height: 1.4;
    }
    .term-cell-def {
      flex: 1;
      font-size: .84rem; color: var(--muted);
      padding: 11px 14px;
      line-height: 1.5;
      display: flex; align-items: center;
    }
    .term-cell-star {
      width: 38px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid #f0ece7;
      cursor: pointer;
      transition: background .12s;
    }
    .term-cell-star:hover { background: #fef9c3; }
    .term-star-icon {
      font-size: 1.1rem; color: #d1c9b8;
      transition: color .15s, transform .15s;
      user-select: none;
    }
    .term-cell-star:hover .term-star-icon { transform: scale(1.2); }
    .term-star-icon.active { color: var(--gold); }

    .no-results { text-align: center; padding: 30px 0; color: var(--muted); font-size: .95rem; }
    .fav-empty {
      text-align: center; padding: 32px 20px; color: var(--muted);
      font-size: .95rem; line-height: 1.8;
    }

    /* ── QUIZ ── */
    .card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px; margin-bottom: 14px;
    }
    .q-counter { font-size: .82rem; color: var(--muted); margin-bottom: 8px; }
    #question-text {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.2rem; font-weight: 700;
      line-height: 1.5; color: var(--navy); margin-bottom: 20px;
    }
    .option-btn {
      display: block; width: 100%;
      background: var(--white); border: 2px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-size: .97rem; font-weight: 500;
      cursor: pointer; text-align: right;
      font-family: 'Heebo', sans-serif;
      transition: all .15s; margin-bottom: 10px; color: var(--text);
    }
    .option-btn:hover:not(:disabled) { border-color: var(--navy2); background: #eef2fb; }
    .option-btn:active:not(:disabled) { transform: scale(.98); }
    .option-btn.correct { border-color: var(--ok); background: var(--ok-bg); color: var(--ok); font-weight: 700; }
    .option-btn.wrong   { border-color: var(--err); background: var(--err-bg); color: var(--err); }
    .option-btn:disabled { cursor: default; }

    .feedback-box {
      border-radius: var(--radius); padding: 14px 16px;
      margin-top: 4px; display: none;
    }
    .feedback-box.show { display: block; }
    .feedback-box.ok  { background: var(--ok-bg);  border: 1px solid #86efac; }
    .feedback-box.err { background: var(--err-bg); border: 1px solid #fca5a5; }
    .feedback-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .feedback-box.ok  .feedback-title { color: var(--ok); }
    .feedback-box.err .feedback-title { color: var(--err); }
    .feedback-concept { font-size: .85rem; color: var(--text); line-height: 1.6; }
    .feedback-concept strong { color: var(--navy); }

    /* ── RESULTS ── */
    .result-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 32px 24px; text-align: center;
    }
    .result-emoji { font-size: 3rem; margin-bottom: 10px; }
    .result-score {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 4rem; font-weight: 900; color: var(--navy);
      line-height: 1; margin-bottom: 6px;
    }
    .result-score span { color: var(--gold); }
    .result-sub { font-size: .95rem; color: var(--muted); margin-bottom: 24px; }
    .result-bar-wrap { background: var(--border); border-radius: 6px; height: 10px; margin-bottom: 24px; overflow: hidden; }
    .result-bar { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--navy2), var(--gold)); transition: width 1s ease; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn .25s ease forwards; }

    @media (max-width: 400px) {
      #main { padding: 14px 12px; }
      .flash-term { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div id="app-header">
  <div class="header-top">
    <div class="app-title">🏛 <span>אזרחות</span></div>
    <button id="home-btn" onclick="goHome()">← חזרה לתפריט</button>
  </div>
  <div id="quiz-stat-bar">
    <span id="stat-chapter"></span>
    <span id="stat-progress"></span>
  </div>
  <div id="quiz-progress-bar-wrap">
    <div id="quiz-progress-bar"></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-dict"  onclick="switchTab('dict')">📖 מילון מונחים</button>
    <button class="tab"        id="tab-quiz"  onclick="switchTab('quiz')">🏆 חידון</button>
    <button class="tab"        id="tab-audio" onclick="switchTab('audio')">🎵 נגן</button>
  </div>
</div>

<div id="main">

  <div id="loader">
    <div class="spinner"></div>
    <div>טוען נתונים...</div>
  </div>

  <!-- ══ DICTIONARY ══ -->
  <div id="screen-dict" class="screen">
    <div id="flash-card">
      <div class="flash-term"    id="flash-term">הגרל מונח לתרגול</div>
      <div class="flash-chapter" id="flash-chapter"></div>
      <div class="flash-def"     id="flash-def"></div>
      <div class="flash-btns">
        <button class="flash-btn draw"   onclick="drawTerm()">🎲 הגרל</button>
        <button class="flash-btn reveal" onclick="revealTerm()">👁 חשוף</button>
      </div>
    </div>

    <div class="dict-toolbar">
      <div id="dict-search-wrap">
        <span style="color:var(--muted);font-size:.95rem">🔍</span>
        <input type="search" id="dict-search" placeholder="חפש מונח..." oninput="onSearch(this.value)">
        <button id="clear-search" onclick="clearSearch()">✕</button>
      </div>
      <button class="dict-icon-btn" id="fav-filter-btn" title="מועדפים בלבד" onclick="toggleFavFilter()">⭐</button>
      <button class="dict-icon-btn" id="toggle-all-btn" title="פתח / סגור הכל" onclick="toggleAllSections()">⇕</button>
    </div>

    <div id="dict-content"></div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div id="screen-quiz" class="screen">

    <div id="quiz-menu" class="screen active">
      <div class="section-label">בחר פרק לתרגול</div>
      <div id="chapter-list"></div>
    </div>

    <div id="quiz-active" class="screen">
      <div class="card fade-in" id="quiz-card">
        <div class="q-counter"    id="q-counter"></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
        <div class="feedback-box" id="feedback-box">
          <div class="feedback-title"   id="feedback-title"></div>
          <div class="feedback-concept" id="feedback-concept"></div>
        </div>
        <button class="primary-btn" id="next-btn" style="display:none" onclick="nextQuestion()">המשך ←</button>
      </div>
    </div>

    <div id="quiz-results" class="screen">
      <div class="result-card fade-in">
        <div class="result-emoji" id="result-emoji">🎉</div>
        <div class="result-score" id="result-score"></div>
        <div class="result-sub"   id="result-sub"></div>
        <div class="result-bar-wrap">
          <div class="result-bar" id="result-bar" style="width:0%"></div>
        </div>
        <button class="primary-btn" onclick="backToChapters()">בחר פרק אחר</button>
        <button class="primary-btn secondary" id="retry-btn">🔁 שחק שוב אותו פרק</button>
      </div>
    </div>

  </div>

  <!-- ══ AUDIO PLAYER ══ -->
  <div id="screen-audio" class="screen">

    <!-- ── Sub-screen: Playlist Library ── -->
    <div id="audio-playlists" class="audio-subscreen active">

      <!-- Source toggle -->
      <div class="audio-source-toggle">
        <button class="ast-btn active" id="ast-server" onclick="setAudioSource('server')">
          <span class="ast-icon">🌐</span>
          <span>מהאתר</span>
        </button>
        <button class="ast-btn" id="ast-local" onclick="setAudioSource('local')">
          <span class="ast-icon">📱</span>
          <span>מהמכשיר</span>
        </button>
      </div>

      <!-- SERVER panel -->
      <div id="audio-server-panel">
        <div class="audio-server-header">
          <div class="audio-server-url-row">
            <input id="server-url-input" class="server-url-input" type="url"
              placeholder="https://yoursite.com/music/"
              value="" />
            <button class="server-scan-btn" onclick="scanServerUrl()">סרוק</button>
          </div>
          <div id="server-scan-status" class="server-scan-status"></div>
        </div>

        <!-- saved server folders -->
        <div id="server-playlists-list"></div>
      </div>

      <!-- LOCAL panel -->
      <div id="audio-local-panel" style="display:none">
        <div class="audio-folder-card">
          <div class="audio-folder-icon">📂</div>
          <div class="audio-folder-text">
            <div class="audio-folder-title">בחר תיקיית שירים</div>
            <div class="audio-folder-sub">כל תת-תיקייה תהפוך לפלייליסט</div>
          </div>
          <label class="audio-open-btn" for="folder-picker">פתח</label>
          <input type="file" id="folder-picker" webkitdirectory multiple accept="audio/*"
            style="display:none" onchange="handleFolderPick(this.files)">
        </div>
        <div id="local-playlists-list"></div>
      </div>

    </div>

    <!-- ── Sub-screen: Track list ── -->
    <div id="audio-tracklist" class="audio-subscreen">
      <div class="tracklist-topbar">
        <button class="audio-back-btn" onclick="showPlaylists()">← חזרה</button>
        <button class="tl-download-all-btn" id="tl-download-all" onclick="downloadPlaylist()" title="הורד כל הפלייליסט" style="display:none">
          ⬇ הורד הכל
        </button>
      </div>
      <div class="audio-playlist-header">
        <div class="audio-playlist-art" id="pl-art">🎵</div>
        <div style="flex:1">
          <div class="audio-playlist-name" id="pl-name"></div>
          <div class="audio-playlist-count" id="pl-count"></div>
        </div>
        <div class="pl-source-badge" id="pl-source-badge"></div>
      </div>
      <div id="tracklist-items"></div>
    </div>

  </div>

  <!-- ══ STICKY PLAYER BAR ══ -->
  <div id="sticky-player" class="sticky-player hidden">
    <div class="sp-track-info" onclick="openFullPlayer()">
      <div class="sp-art" id="sp-art">🎵</div>
      <div class="sp-meta">
        <div class="sp-title" id="sp-title">—</div>
        <div class="sp-artist" id="sp-artist">—</div>

<script>
// ── Config ────────────────────────────────────────────────
const TERMS_FILE     = "terms.csv";
const QUESTIONS_FILE = "questions.csv";

// ── State ─────────────────────────────────────────────────
// termsData: { chapter: { sub: [{name,def,sub,chapter}] } }
let termsData     = {};
let allTerms      = [];   // flat list [{name,def,sub,chapter}]
let termsMap      = {};   // { termName: {def,sub,chapter} }
let questionsData = [];   // raw question rows

let quizChapterName = "";
let quizQuestions   = [];
let quizIdx = 0, quizCorrect = 0;

// ── Helpers ───────────────────────────────────────────────
const $     = id => document.getElementById(id);
const clean = s  => s ? s.toString().replace(/[\u200B-\u200D\uFEFF]/g,"").trim().replace(/\s+/g," ") : "";
const escRe = s  => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

// ── Boot: load both CSVs ──────────────────────────────────
let loaded = 0;
function onLoaded() { if (++loaded === 2) { $('loader').style.display='none'; initDict(); initQuizMenu(); $('screen-dict').classList.add('active'); } }

Papa.parse(`${TERMS_FILE}?v=${Date.now()}`, {
  download:true, header:true, skipEmptyLines:true,
  complete(res) {
    res.data.forEach(row => {
      const r = {}; for (let k in row) r[clean(k)] = clean(row[k]);
      const name    = r["מושג"];
      const def     = r["ביאור"];
      const chapter = r["פרק"];
      const sub     = r["תת-פרק"] || "";
      if (!name) return;
      if (!termsData[chapter]) termsData[chapter] = {};
      const key = sub || "—";
      if (!termsData[chapter][key]) termsData[chapter][key] = [];
      termsData[chapter][key].push({name, def, sub, chapter});
      allTerms.push({name, def, sub, chapter});
      termsMap[name] = {def, sub, chapter};
    });
    onLoaded();
  },
  error() { $('loader').innerHTML = '<p style="color:#b91c1c;text-align:center">שגיאה בטעינת terms.csv</p>'; }
});

Papa.parse(`${QUESTIONS_FILE}?v=${Date.now()}`, {
  download:true, header:true, skipEmptyLines:true,
  complete(res) {
    questionsData = res.data.map(row => { const r={}; for(let k in row) r[clean(k)]=clean(row[k]); return r; });
    onLoaded();
  },
  error() { $('loader').innerHTML = '<p style="color:#b91c1c;text-align:center">שגיאה בטעינת questions.csv</p>'; }
});

// ── DICTIONARY ────────────────────────────────────────────
// Favorites stored in localStorage
let favTerms    = new Set(JSON.parse(localStorage.getItem('civ_favs') || '[]'));
let favOnly     = false;
let allExpanded = false;   // tracks toggle-all state

function saveFavs() { localStorage.setItem('civ_favs', JSON.stringify([...favTerms])); }

function initDict() {
  renderDict(termsData);
}

// ── Build highlight HTML ──
function hlText(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${escRe(q)})`,'gi'), '<mark style="background:#fef9c3;border-radius:2px">$1</mark>');
}

// ── Main render ──────────────────────────────────────────
function renderDict(data, hl='') {
  const c = $('dict-content'); c.innerHTML = '';
  const chapters = Object.keys(data);
  if (!chapters.length) {
    c.innerHTML = '<div class="no-results">לא נמצאו מונחים 🔍</div>'; return;
  }

  chapters.forEach((chapter, ci) => {
    const subsObj    = data[chapter];
    const subNames   = Object.keys(subsObj);
    const totalTerms = subNames.reduce((n,s)=>n+subsObj[s].length, 0);
    const hasRealSubs = !(subNames.length===1 && subNames[0]==='—');
    const isOpen      = ci===0 || !!hl;   // first chapter open by default

    // ── Chapter wrapper ──
    const section = document.createElement('div');
    section.className = 'chapter-section';
    section.dataset.chap = chapter;

    // ── Chapter header ──
    const chHead = document.createElement('div');
    chHead.className = 'chapter-header' + (isOpen?' open':'');
    chHead.innerHTML = `
      <div class="ch-left">
        <span>${chapter}</span>
        <span class="ch-count">${totalTerms}</span>
      </div>
      <span class="ch-arrow">▼</span>`;

    const chBody = document.createElement('div');
    chBody.className = 'chapter-body' + (isOpen?' open':'');
    chHead.onclick = () => {
      chHead.classList.toggle('open');
      chBody.classList.toggle('open');
    };

    // ── Sub-sections ──
    subNames.forEach(sub => {
      const terms = subsObj[sub];
      const subIsOpen = !!hl || !hasRealSubs;  // open when searching

      if (hasRealSubs && sub !== '—') {
        // Sub-chapter with its own toggle
        const subSec = document.createElement('div');
        subSec.className = 'sub-section';

        const subHead = document.createElement('div');
        subHead.className = 'sub-header' + (subIsOpen?' open':'');
        subHead.innerHTML = `
          <div class="sub-left">
            <span>${sub}</span>
            <span class="sub-count">(${terms.length})</span>
          </div>
          <span class="sub-arrow">▼</span>`;

        const subBody = document.createElement('div');
        subBody.className = 'sub-body' + (subIsOpen?' open':'');
        subHead.onclick = () => {
          subHead.classList.toggle('open');
          subBody.classList.toggle('open');
        };

        subBody.appendChild(buildTermsTable(terms, hl));
        subSec.appendChild(subHead);
        subSec.appendChild(subBody);
        chBody.appendChild(subSec);
      } else {
        // No sub-chapters — terms go directly into chapter body
        chBody.appendChild(buildTermsTable(terms, hl));
      }
    });

    section.appendChild(chHead);
    section.appendChild(chBody);
    c.appendChild(section);
  });
}

// ── Build a table of terms ────────────────────────────────
function buildTermsTable(terms, hl) {
  const table = document.createElement('div');
  table.className = 'terms-table';

  terms.forEach(t => {
    const row = document.createElement('div');
    row.className = 'term-row';
    row.dataset.termName = t.name;

    const isFav = favTerms.has(t.name);
    if (favOnly && !isFav) row.classList.add('fav-only-hidden');

    row.innerHTML = `
      <div class="term-cell-star" onclick="toggleFav('${t.name.replace(/'/g,"\\'")}', this)" title="${isFav?'הסר ממועדפים':'הוסף למועדפים'}">
        <span class="term-star-icon${isFav?' active':''}">★</span>
      </div>
      <div class="term-cell-name">${hlText(t.name, hl)}</div>
      <div class="term-cell-def">${hlText(t.def, hl)}</div>`;

    table.appendChild(row);
  });
  return table;
}

// ── Toggle single term favorite ──────────────────────────
function toggleFav(name, cell) {
  const icon = cell.querySelector('.term-star-icon');
  if (favTerms.has(name)) {
    favTerms.delete(name);
    icon.classList.remove('active');
    cell.title = 'הוסף למועדפים';
  } else {
    favTerms.add(name);
    icon.classList.add('active');
    cell.title = 'הסר ממועדפים';
  }
  saveFavs();
  if (favOnly) applyFavFilter();
}

// ── Favorites filter ─────────────────────────────────────
function toggleFavFilter() {
  favOnly = !favOnly;
  $('fav-filter-btn').classList.toggle('active', favOnly);
  applyFavFilter();
}

function applyFavFilter() {
  if (favOnly && favTerms.size === 0) {
    $('dict-content').innerHTML = '<div class="fav-empty">⭐ עדיין אין מועדפים<br><small>לחץ על ★ ליד מונח כדי להוסיפו</small></div>';
    return;
  }
  // Re-render if we had previously shown the empty state
  if ($('dict-content').querySelector('.fav-empty')) { renderDict(termsData); return; }
  // Otherwise just show/hide rows
  document.querySelectorAll('.term-row').forEach(row => {
    const name = row.dataset.termName;
    const hide = favOnly && !favTerms.has(name);
    row.classList.toggle('fav-only-hidden', hide);
  });
  // Hide empty tables / sub-headers / chapter headers
  document.querySelectorAll('.terms-table').forEach(tbl => {
    const hasVisible = [...tbl.querySelectorAll('.term-row')].some(r=>!r.classList.contains('fav-only-hidden'));
    tbl.style.display = hasVisible ? '' : 'none';
  });
  document.querySelectorAll('.sub-section').forEach(ss => {
    const hasVisible = [...ss.querySelectorAll('.term-row')].some(r=>!r.classList.contains('fav-only-hidden'));
    ss.style.display = hasVisible ? '' : 'none';
  });
  document.querySelectorAll('.chapter-section').forEach(cs => {
    const hasVisible = [...cs.querySelectorAll('.term-row')].some(r=>!r.classList.contains('fav-only-hidden'));
    cs.style.display = hasVisible ? '' : 'none';
  });
}

// ── Toggle all open / close ───────────────────────────────
function toggleAllSections() {
  allExpanded = !allExpanded;
  $('toggle-all-btn').classList.toggle('active', allExpanded);
  document.querySelectorAll('.chapter-header').forEach(h => h.classList.toggle('open', allExpanded));
  document.querySelectorAll('.chapter-body').forEach(b => b.classList.toggle('open', allExpanded));
  document.querySelectorAll('.sub-header').forEach(h => h.classList.toggle('open', allExpanded));
  document.querySelectorAll('.sub-body').forEach(b => b.classList.toggle('open', allExpanded));
}

// ── Search ────────────────────────────────────────────────
function onSearch(val) {
  const q = val.trim();
  $('clear-search').style.display = q ? 'inline' : 'none';
  if (!q) { renderDict(termsData); if (favOnly) applyFavFilter(); return; }

  const filtered = {};
  allTerms.forEach(t => {
    if (t.name.includes(q) || t.def.includes(q)) {
      const sub = t.sub || '—';
      if (!filtered[t.chapter]) filtered[t.chapter] = {};
      if (!filtered[t.chapter][sub]) filtered[t.chapter][sub] = [];
      filtered[t.chapter][sub].push(t);
    }
  });
  renderDict(filtered, q);
  if (favOnly) applyFavFilter();
}

function clearSearch() {
  $('dict-search').value = '';
  $('clear-search').style.display = 'none';
  renderDict(termsData);
  if (favOnly) applyFavFilter();
}

// ── Flash card ────────────────────────────────────────────
let lastFlash = -1;
function drawTerm() {
  const pool = favOnly && favTerms.size ? allTerms.filter(t=>favTerms.has(t.name)) : allTerms;
  if (!pool.length) return;
  let i; do { i = Math.floor(Math.random()*pool.length); } while(pool.length>1 && i===lastFlash);
  lastFlash = i;
  const t = pool[i];
  $('flash-term').textContent    = t.name;
  $('flash-chapter').textContent = t.sub ? `${t.chapter} ← ${t.sub}` : t.chapter;
  $('flash-def').textContent     = t.def;
  $('flash-def').style.display   = 'none';
}
function revealTerm() {
  const d = $('flash-def');
  if (d.textContent) d.style.display = d.style.display==='block' ? 'none' : 'block';
}

// ── QUIZ ──────────────────────────────────────────────────
function initQuizMenu() {
  const chapters  = [...new Set(questionsData.map(r=>r["פרק"]))].filter(Boolean);
  const container = $('chapter-list'); container.innerHTML = '';

  chapters.forEach(name => {
    const chapterSubs = termsData[name] || {};
    const termCount   = Object.values(chapterSubs).reduce((n,arr)=>n+arr.length, 0);
    const qCount    = questionsData.filter(r=>r["פרק"]===name).length;
    const btn = document.createElement('button');
    btn.className = 'chapter-btn';
    btn.innerHTML = `<span class="icon">📖</span><div><div>${name}</div><div class="meta">${termCount ? termCount+' מושגים · ' : ''}${qCount} שאלות</div></div>`;
    btn.onclick   = () => startQuiz(name);
    container.appendChild(btn);
  });
}

function startQuiz(chapterName) {
  const filtered = questionsData.filter(r=>r["פרק"]===chapterName);
  const grouped  = {};
  filtered.forEach(r => { const c=r["מושג"]||"כללי"; if(!grouped[c]) grouped[c]=[]; grouped[c].push(r); });

  quizQuestions   = Object.values(grouped).map(qs=>qs[Math.floor(Math.random()*qs.length)]).sort(()=>Math.random()-.5);
  quizChapterName = chapterName;
  quizIdx = 0; quizCorrect = 0;

  showQuizScreen('quiz-active');
  $('home-btn').style.display             = 'inline';
  $('quiz-stat-bar').classList.add('show');
  $('quiz-progress-bar-wrap').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[quizIdx];
  $('stat-chapter').textContent  = quizChapterName;
  $('stat-progress').textContent = `${quizIdx+1}/${quizQuestions.length}`;
  $('quiz-progress-bar').style.width = (quizIdx/quizQuestions.length*100)+'%';
  $('q-counter').textContent     = `שאלה ${quizIdx+1} מתוך ${quizQuestions.length}`;
  $('question-text').textContent = q["שאלה"];

  const fb = $('feedback-box'); fb.classList.remove('show','ok','err');
  $('next-btn').style.display = 'none';

  const cont = $('options-container'); cont.innerHTML = '';
  q["תשובות"].split('/').map(c=>clean(c)).sort(()=>Math.random()-.5).forEach(choice => {
    const btn = document.createElement('button');
    btn.className   = 'option-btn';
    btn.textContent = choice;
    btn.onclick     = () => handleAnswer(choice, q, btn);
    cont.appendChild(btn);
  });
}

function handleAnswer(selected, q, clickedBtn) {
  const correctVal  = q["תשובה נכונה"];
  const conceptName = q["מושג"];
  const isCorrect   = clean(selected) === correctVal;
  if (isCorrect) quizCorrect++;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (clean(b.textContent)===correctVal) b.classList.add('correct');
    else if (b===clickedBtn && !isCorrect)  b.classList.add('wrong');
  });

  // Definition always from terms.csv
  const def = (termsMap[correctVal] || termsMap[conceptName] || {}).def || "—";

  const fb = $('feedback-box');
  fb.classList.add('show', isCorrect ? 'ok' : 'err');
  $('feedback-title').textContent = isCorrect ? '✅ נכון!' : `❌ לא נכון — התשובה: ${correctVal}`;
  $('feedback-concept').innerHTML = `<strong>${conceptName}:</strong> ${def}`;

  $('next-btn').style.display   = 'block';
  $('next-btn').textContent     = quizIdx+1 < quizQuestions.length ? 'המשך ←' : 'לסיכום ←';
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx < quizQuestions.length) {
    showQuestion();
    const card = $('quiz-card');
    card.classList.remove('fade-in'); void card.offsetWidth; card.classList.add('fade-in');
  } else { showResults(); }
}

function showResults() {
  showQuizScreen('quiz-results');
  $('quiz-progress-bar').style.width = '100%';
  const pct   = Math.round(quizCorrect/quizQuestions.length*100);
  const emoji = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'💪';
  $('result-emoji').textContent = emoji;
  $('result-score').innerHTML   = `${pct}<span>%</span>`;
  $('result-sub').textContent   = `ענית נכון על ${quizCorrect} מתוך ${quizQuestions.length} שאלות בפרק "${quizChapterName}"`;
  setTimeout(() => { $('result-bar').style.width = pct+'%'; }, 80);
  $('retry-btn').onclick = () => startQuiz(quizChapterName);
}

function backToChapters() {
  showQuizScreen('quiz-menu');
  $('home-btn').style.display               = 'none';
  $('quiz-stat-bar').classList.remove('show');
  $('quiz-progress-bar-wrap').style.display = 'none';
  $('quiz-progress-bar').style.width        = '0%';
}

function showQuizScreen(id) {
  ['quiz-menu','quiz-active','quiz-results'].forEach(s=>$(s).classList.remove('active'));
  $(id).classList.add('active');
}

function goHome() { backToChapters(); }

function switchTab(tab) {
  ['dict','quiz','audio'].forEach(t => {
    $(`tab-${t}`).classList.toggle('active', t===tab);
    $(`screen-${t}`).classList.toggle('active', t===tab);
  });
  if (tab==='dict') {
    $('home-btn').style.display               = 'none';
    $('quiz-stat-bar').classList.remove('show');
    $('quiz-progress-bar-wrap').style.display = 'none';
  } else if (tab==='quiz' && $('quiz-active').classList.contains('active')) {
    $('home-btn').style.display               = 'inline';
    $('quiz-stat-bar').classList.add('show');
    $('quiz-progress-bar-wrap').style.display = 'block';
  } else if (tab==='audio') {
    $('home-btn').style.display               = 'none';
    $('quiz-stat-bar').classList.remove('show');
    $('quiz-progress-bar-wrap').style.display = 'none';
  }
}

// ── Constants ─────────────────────────────────────────────
const AUDIO_STORAGE_KEY    = 'audioPlayerState';
const SERVER_FOLDERS_KEY   = 'audioServerFolders';   // [{name, url}]
const DOWNLOADED_KEY_PFX   = 'dl_';                  // + playlistName+trackTitle → base64
const AUDIO_SOURCE_KEY     = 'audioSourceMode';      // 'server' | 'local'

// ── State ─────────────────────────────────────────────────
let audioSource     = localStorage.getItem(AUDIO_SOURCE_KEY) || 'server';

//  SERVER SOURCE
// ════════════════════════════════════════════════════════════

function loadServerFolders() {
  try { return JSON.parse(localStorage.getItem(SERVER_FOLDERS_KEY) || '[]'); } catch(e) { return []; }
}
function saveServerFolders() {
  try { localStorage.setItem(SERVER_FOLDERS_KEY, JSON.stringify(serverFolders)); } catch(e){}
}

async function scanServerUrl() {
  const rawUrl = $('server-url-input').value.trim();
  if (!rawUrl) { setStatus('הכנס כתובת URL', 'err'); return; }

  let baseUrl = rawUrl;
  if (!baseUrl.endsWith('/')) baseUrl += '/';

  setStatus('🔍 סורק...', '');
  const scanBtn = document.querySelector('.server-scan-btn');
  scanBtn.disabled = true;

  try {
    // Fetch the directory listing page
    const res = await fetch(baseUrl, { headers: { 'Accept': 'text/html' } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();

    // Parse links from directory listing (Apache/nginx style)
    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');
    const links  = [...doc.querySelectorAll('a[href]')];

    // Find sub-folders and audio files
    const subFolders = links
      .map(a => a.getAttribute('href'))
      .filter(h => h && !h.startsWith('?') && !h.startsWith('/') && !h.startsWith('..') && h.endsWith('/'));

    const audioFiles = links
      .map(a => a.getAttribute('href'))
      .filter(h => h && /\.(mp3|wav|aac|m4a|ogg|flac)$/i.test(h));

    if (!subFolders.length && !audioFiles.length) {
      setStatus('⚠️ לא נמצאו תיקיות או קבצי אודיו. ודא שהשרת מציג תוכן תיקייה.', 'err');
      scanBtn.disabled = false;
      return;
    }

    // Determine folder name from URL
    const urlParts = baseUrl.replace(/\/$/, '').split('/');
    const folderName = decodeURIComponent(urlParts[urlParts.length - 1]) || 'ספרייה';

    // If there are direct audio files at root, treat root as one playlist
    // If sub-folders exist, each sub-folder becomes a playlist
    let newPlaylists = [];

    if (audioFiles.length) {
      // Root has audio files → one playlist
      const tracks = audioFiles.map(href => ({
        title:    decodeURIComponent(href).replace(/\.[^.]+$/, '').replace(/^\d+[\s._-]+/, ''),
        artist:   '',
        art:      null,
        duration: 0,
        url:      baseUrl + href,
        isServer: true
      }));
      newPlaylists.push({ name: folderName, source: 'server', baseUrl, tracks });
    }

    if (subFolders.length) {
      // Scan each sub-folder
      setStatus(`⏳ סורק ${subFolders.length} תיקיות...`, '');
      for (const folder of subFolders) {
        const subUrl   = baseUrl + folder;
        const subName  = decodeURIComponent(folder.replace(/\/$/, ''));
        try {
          const subRes  = await fetch(subUrl, { headers: { 'Accept': 'text/html' } });
          if (!subRes.ok) continue;
          const subHtml = await subRes.text();
          const subDoc  = parser.parseFromString(subHtml, 'text/html');
          const subFiles = [...subDoc.querySelectorAll('a[href]')]
            .map(a => a.getAttribute('href'))
            .filter(h => h && /\.(mp3|wav|aac|m4a|ogg|flac)$/i.test(h));
          if (!subFiles.length) continue;
          const tracks = subFiles.map(href => ({
            title:    decodeURIComponent(href).replace(/\.[^.]+$/, '').replace(/^\d+[\s._-]+/, ''),
            artist:   '',
            art:      null,
            duration: 0,
            url:      subUrl + href,
            isServer: true
          }));
          newPlaylists.push({ name: subName, source: 'server', baseUrl: subUrl, tracks });
        } catch(e) { /* skip this subfolder */ }
      }
    }

    if (!newPlaylists.length) {
      setStatus('⚠️ לא נמצאו קבצי אודיו בכתובת שהוזנה.', 'err');
      scanBtn.disabled = false;
      return;
    }

    // Save folder entry
    if (!serverFolders.find(f => f.url === baseUrl)) {
      serverFolders.push({ name: folderName, url: baseUrl });
      saveServerFolders();
    }

    // Merge into playlists (server source)
    // Remove old playlists from this baseUrl then add fresh ones
    playlists = playlists.filter(p => p.source !== 'server' || !p.baseUrl?.startsWith(baseUrl));
    playlists.push(...newPlaylists);

    setStatus(`✅ נמצאו ${newPlaylists.length} פלייליסטים, ${newPlaylists.reduce((s,p)=>s+p.tracks.length,0)} שירים`, 'ok');
    renderServerFolders();
  } catch(err) {
    setStatus('❌ שגיאה: ' + (err.message || 'לא ניתן לגשת לכתובת'), 'err');
  }
  scanBtn.disabled = false;
}

function setStatus(msg, cls) {
  const el = $('server-scan-status');
  el.textContent = msg;
  el.className = 'server-scan-status' + (cls ? ' ' + cls : '');
}

function renderServerFolders() {
  const el = $('server-playlists-list');

  // Server playlists already loaded
  const serverPls = playlists.filter(p => p.source === 'server');

  if (!serverFolders.length && !serverPls.length) {
    el.innerHTML = `<div class="audio-empty">
      <div class="ae-icon">🌐</div>
      <div class="ae-title">אין ספריות שמורות</div>
      <div class="ae-sub">הזן כתובת URL של תיקיית שרת שמכילה קבצי אודיו, ולחץ "סרוק"</div>
    </div>`;
    return;
  }

  // Show scanned playlists grouped by server folder
  if (serverPls.length) {
    el.innerHTML = serverPls.map((pl, idx) => {
      const globalIdx = playlists.indexOf(pl);
      const dlCount   = pl.tracks.filter(t => isDownloaded(pl.name, t.title)).length;
      return `
      <div class="playlist-card ${currentPlaylist===globalIdx?'playing':''}" onclick="openPlaylist(${globalIdx})">
        <div class="playlist-card-art">🎵</div>
        <div class="playlist-card-info">
          <div class="playlist-card-name">${pl.name}</div>
          <div class="playlist-card-count">${pl.tracks.length} שירים${dlCount ? ` · ${dlCount} ⬇ שמורים` : ''}</div>
        </div>
        <span class="playlist-card-src">🌐 אתר</span>
      </div>`;
    }).join('') +
    // Saved server folder entries for re-scan
    serverFolders.map((f, fi) => `
      <div class="server-folder-item">
        <div class="sfi-icon">📡</div>
        <div class="sfi-info">
          <div class="sfi-name">${f.name}</div>
          <div class="sfi-url">${f.url}</div>
        </div>
        <div class="sfi-actions">
          <button class="sfi-btn open" onclick="reScanFolder(${fi})">סרוק מחדש</button>
          <button class="sfi-btn del"  onclick="removeServerFolder(${fi})">מחק</button>
        </div>
      </div>`).join('');
  } else {
    el.innerHTML = serverFolders.map((f, fi) => `
      <div class="server-folder-item">
        <div class="sfi-icon">📡</div>
        <div class="sfi-info">
          <div class="sfi-name">${f.name}</div>
          <div class="sfi-url">${f.url}</div>
        </div>
        <div class="sfi-actions">
          <button class="sfi-btn open" onclick="reScanFolder(${fi})">סרוק</button>
          <button class="sfi-btn del"  onclick="removeServerFolder(${fi})">מחק</button>
        </div>
      </div>`).join('');
  }
}

async function reScanFolder(fi) {
  const f = serverFolders[fi];
  $('server-url-input').value = f.url;
  await scanServerUrl();
}

function removeServerFolder(fi) {
  const f = serverFolders[fi];
  serverFolders.splice(fi, 1);
  saveServerFolders();
  // Remove its playlists
  playlists = playlists.filter(p => !(p.source === 'server' && p.baseUrl === f.url));
  renderServerFolders();
}

// ════════════════════════════════════════════════════════════

async function handleFolderPick(files) {
  const fileArr = Array.from(files).filter(f =>
    /\.(mp3|wav|aac|m4a|ogg|flac)$/i.test(f.name)
  );
  if (!fileArr.length) { alert('לא נמצאו קבצי אודיו.'); return; }

  const groups = {};
  fileArr.forEach(f => {
    const parts  = (f.webkitRelativePath || f.name).split('/');
    const folder = parts.length > 1 ? parts[parts.length - 2] : 'ספרייה ראשית';
    if (!groups[folder]) groups[folder] = [];
    groups[folder].push(f);
  });

  // Remove old local playlists
  playlists = playlists.filter(p => p.source !== 'local');

  for (const [name, fs] of Object.entries(groups)) {
    const tracks = await Promise.all(fs.map(f => readTrackMeta(f)));
    tracks.sort((a,b) => a.title.localeCompare(b.title, 'he'));
    playlists.push({ name, source: 'local', tracks });
  }
  playlists.sort((a,b) => a.name.localeCompare(b.name, 'he'));

  renderLocalPlaylists();
  restoreAudioState();
}

async function readTrackMeta(file) {
  const url      = URL.createObjectURL(file);
  const title    = file.name.replace(/\.[^.]+$/, '').replace(/^\d+[\s._-]+/, '');
  let duration   = 0;
  await new Promise(resolve => {
    const a = new Audio();
    a.preload = 'metadata'; a.src = url;
    a.onloadedmetadata = () => { duration = a.duration; resolve(); };
    a.onerror = resolve;
    setTimeout(resolve, 3000);
  });
  return { title, artist: '', art: null, duration, url, isServer: false };
}

function renderLocalPlaylists() {
  const el  = $('local-playlists-list');
  const pls = playlists.filter(p => p.source === 'local');
  if (!pls.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = pls.map(pl => {
    const globalIdx = playlists.indexOf(pl);
    return `
    <div class="playlist-card ${currentPlaylist===globalIdx?'playing':''}" onclick="openPlaylist(${globalIdx})">
      <div class="playlist-card-art">🎵</div>
      <div class="playlist-card-info">
        <div class="playlist-card-name">${pl.name}</div>
        <div class="playlist-card-count">${pl.tracks.length} שירים</div>
      </div>
      <span class="playlist-card-src local">📱 מכשיר</span>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════════
//  DOWNLOAD / OFFLINE CACHE  (IndexedDB)
// ════════════════════════════════════════════════════════════

const DB_NAME    = 'AudioOfflineDB';
const DB_STORE   = 'tracks';
let   offlineDB  = null;

async function openDB() {
  if (offlineDB) return offlineDB;
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess       = e => { offlineDB = e.target.result; res(offlineDB); };
    req.onerror         = () => rej(req.error);
  });
}

function dlKey(playlistName, trackTitle) {
  return `${playlistName}||${trackTitle}`;
}

async function isDownloaded(playlistName, trackTitle) {
  try {
    const db  = await openDB();
    const tx  = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(dlKey(playlistName, trackTitle));
    return await new Promise(res => { req.onsuccess = () => res(!!req.result); req.onerror = () => res(false); });
  } catch(e) { return false; }
}

async function getDownloaded(playlistName, trackTitle) {
  try {
    const db  = await openDB();
    const tx  = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(dlKey(playlistName, trackTitle));
    return await new Promise(res => { req.onsuccess = () => res(req.result || null); req.onerror = () => res(null); });
  } catch(e) { return null; }
}

async function storeDownloaded(playlistName, trackTitle, blob) {
  try {
    const db  = await openDB();
    const tx  = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(blob, dlKey(playlistName, trackTitle));
    return new Promise(res => { tx.oncomplete = () => res(true); tx.onerror = () => res(false); });
  } catch(e) { return false; }
}

async function deleteDownloaded(playlistName, trackTitle) {
  try {
    const db  = await openDB();
    const tx  = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(dlKey(playlistName, trackTitle));
  } catch(e) {}
}

// ── Download single track ─────────────────────────────────
async function downloadTrack(plIdx, trIdx, event) {
  event.stopPropagation();
  const pl    = playlists[plIdx];
  const track = pl.tracks[trIdx];
  const key   = dlKey(pl.name, track.title);
  const btn   = event.currentTarget;

  if (await isDownloaded(pl.name, track.title)) {
    // Already downloaded — offer to remove
    if (confirm(`מחק את "${track.title}" מהאחסון המקומי?`)) {
      await deleteDownloaded(pl.name, track.title);
      btn.textContent = '⬇';
      btn.classList.remove('downloaded');
      showToast('🗑 הוסר מהאחסון');
    }
    return;
  }

  btn.textContent = '⏳';
  btn.disabled    = true;

  try {
    const res  = await fetch(track.url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    await storeDownloaded(pl.name, track.title, blob);
    btn.textContent = '✅';
    btn.classList.add('downloaded');
    btn.disabled    = false;
    showToast(`✅ "${track.title}" נשמר`);
    // Update track URL to local blob for future playback
    track.offlineBlob = blob;
  } catch(err) {
    btn.textContent = '⬇';
    btn.disabled    = false;
    showToast('❌ שגיאה בהורדה');
  }
}

// ── Download entire playlist ──────────────────────────────
async function downloadPlaylist() {
  if (currentPlaylist < 0) return;
  const pl  = playlists[currentPlaylist];
  const btn = $('tl-download-all');
  btn.textContent = '⏳ מוריד...';
  btn.disabled    = true;

  let done = 0;
  for (let i = 0; i < pl.tracks.length; i++) {
    const t = pl.tracks[i];
    if (await isDownloaded(pl.name, t.title)) { done++; continue; }
    try {
      const res  = await fetch(t.url);
      if (!res.ok) continue;
      const blob = await res.blob();
      await storeDownloaded(pl.name, t.title, blob);
      t.offlineBlob = blob;
      done++;
      btn.textContent = `⏳ ${done}/${pl.tracks.length}`;
      // Update dl button in list
      const dlBtn = document.getElementById(`dl-btn-${i}`);
      if (dlBtn) { dlBtn.textContent = '✅'; dlBtn.classList.add('downloaded'); }
    } catch(e) {}
  }

  btn.textContent = `✅ הורד (${done})`;
  btn.disabled    = false;
  showToast(`✅ ${done} שירים נשמרו להפעלה אופליין`);
}

// ── Toast helper ──────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = $('dl-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ════════════════════════════════════════════════════════════
//  OPEN PLAYLIST / RENDER TRACKS
// ════════════════════════════════════════════════════════════

async function openPlaylist(idx) {
  currentPlaylist = idx;
  const pl = playlists[idx];
  $('pl-name').textContent  = pl.name;
  $('pl-count').textContent = `${pl.tracks.length} שירים`;
  $('pl-art').innerHTML     = '🎵';

  const badge = $('pl-source-badge');
  badge.textContent = pl.source === 'server' ? '🌐 אתר' : '📱 מכשיר';

  // Show download-all only for server playlists
  const dlAll = $('tl-download-all');
  dlAll.style.display = pl.source === 'server' ? '' : 'none';
  dlAll.textContent   = '⬇ הורד הכל';
  dlAll.disabled      = false;

  // Build track rows — check offline status
  const dlStatuses = await Promise.all(pl.tracks.map(t => isDownloaded(pl.name, t.title)));

  const wrap = document.createElement('div');
  wrap.className = 'track-rows-wrap';
  wrap.innerHTML = pl.tracks.map((t, ti) => {
    const isActive = currentTrack===ti && currentPlaylist===idx;
    const isDl     = dlStatuses[ti];
    return `
    <div class="track-row ${isActive ? 'active' : ''}" id="track-row-${ti}" onclick="playTrack(${ti})">
      <div class="track-num">${isActive ? '' : ti+1}</div>
      <div class="track-playing-indicator">
        ${isActive && !audioEl.paused ? '<span class="track-wave"><span></span><span></span><span></span></span>' : ''}
      </div>
      <div class="track-art">♪</div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        ${t.artist ? `<div class="track-artist">${t.artist}</div>` : ''}
      </div>
      <div class="track-dur">${fmtTime(t.duration)}</div>
      ${pl.source === 'server' ? `
        <button id="dl-btn-${ti}" class="track-dl-btn ${isDl?'downloaded':''}"
          onclick="downloadTrack(${idx},${ti},event)"
          title="${isDl?'שמור — לחץ למחיקה':'הורד לשמירה אופליין'}">
          ${isDl ? '✅' : '⬇'}
        </button>` : ''}
    </div>`;
  }).join('');

  $('tracklist-items').innerHTML = '';
  $('tracklist-items').appendChild(wrap);

  $('audio-playlists').classList.remove('active');
  $('audio-tracklist').classList.add('active');
}

function showPlaylists() {
  $('audio-tracklist').classList.remove('active');
  $('audio-playlists').classList.add('active');
  if (audioSource === 'server') renderServerFolders();
  else renderLocalPlaylists();
}

// ════════════════════════════════════════════════════════════
//  PLAYBACK
// ════════════════════════════════════════════════════════════

async function playTrack(idx, seekTo) {
  if (currentPlaylist < 0) return;
  currentTrack     = idx;
  seekTo           = seekTo || 0;
  const pl         = playlists[currentPlaylist];
  const track      = pl.tracks[idx];

  // For server tracks: prefer offline blob, fall back to URL
  let src = track.url;
  if (pl.source === 'server') {
    const blob = track.offlineBlob || await getDownloaded(pl.name, track.title);
    if (blob) {
      src = URL.createObjectURL(blob);
      track.offlineBlob = blob; // cache for next time
    }
  }

  audioEl.src = src;
  audioEl.currentTime = seekTo;
  audioEl.play().catch(()=>{});

  updatePlayerUI(track);
  updateTracklistHighlight();
  updateSeekBar();
  acquireWakeLock();
  setupMediaSession(track);
  saveAudioState();
  $('sticky-player').classList.remove('hidden');
}

function togglePlay() {
  if (!audioEl.src) return;
  if (audioEl.paused) audioEl.play();
  else { audioEl.pause(); saveAudioState(); }
}

function stopAudio() {
  audioEl.pause(); audioEl.currentTime = 0;
  $('fp-play-btn').textContent = '▶';
  $('sp-play-btn').textContent = '▶';
  saveAudioState(); releaseWakeLock();
}

function prevTrack() {
  if (currentPlaylist < 0) return;
  if (audioEl.currentTime > 3) { audioEl.currentTime = 0; return; }
  const len = playlists[currentPlaylist].tracks.length;
  playTrack((currentTrack - 1 + len) % len);
}

function nextTrack() {
  if (currentPlaylist < 0) return;
  const len = playlists[currentPlaylist].tracks.length;
  playTrack((currentTrack + 1) % len);
}

function skipBack()    { audioEl.currentTime = Math.max(0, audioEl.currentTime - 15); }
function skipForward() { audioEl.currentTime = Math.min(audioEl.duration || 0, audioEl.currentTime + 15); }

// ── UI Updates ────────────────────────────────────────────
function updatePlayerUI(track) {
  const title  = track.title;
  const artist = track.artist || '';
  const artContent = track.art ? `<img src="${track.art}">` : '🎵';
  $('sp-title').textContent   = title;
  $('sp-artist').textContent  = artist || 'לחץ לפתיחת הנגן';
  $('sp-art').innerHTML       = artContent;
  $('fp-title').textContent   = title;
  $('fp-artist').textContent  = artist || '—';
  $('fp-art').innerHTML       = artContent;
  $('fp-play-btn').textContent = '⏸';
  $('sp-play-btn').textContent = '⏸';
}

function updateTracklistHighlight() {
  document.querySelectorAll('.track-row').forEach((row, i) => {
    row.classList.toggle('active', i === currentTrack);
    const numEl = row.querySelector('.track-num');
    const wavEl = row.querySelector('.track-playing-indicator');
    if (numEl) numEl.textContent = i === currentTrack ? '' : i+1;
    if (wavEl) wavEl.innerHTML = i === currentTrack && !audioEl.paused
      ? '<span class="track-wave"><span></span><span></span><span></span></span>' : '';
  });
}

function updateSeekBar() {
  const seek = $('fp-seek');
  if (!seek || isSeeking) return;
  const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration) * 100 : 0;
  seek.value = pct;
  seek.style.background = `linear-gradient(to left, var(--border) ${100-pct}%, var(--navy2) ${100-pct}%)`;
  $('fp-current').textContent  = fmtTime(audioEl.currentTime);
  $('fp-duration').textContent = fmtTime(audioEl.duration || 0);
}

// ── Full Player ───────────────────────────────────────────
function openFullPlayer()  { $('full-player').classList.remove('hidden'); }
function closeFullPlayer() { $('full-player').classList.add('hidden'); }

// ── Seek ──────────────────────────────────────────────────
const seekInput = document.getElementById('fp-seek');
if (seekInput) {
  seekInput.addEventListener('mousedown',  () => isSeeking = true);
  seekInput.addEventListener('touchstart', () => isSeeking = true, {passive:true});
  seekInput.addEventListener('input', e => {
    $('fp-current').textContent = fmtTime((e.target.value/100) * (audioEl.duration||0));
  });
  seekInput.addEventListener('change', e => {
    audioEl.currentTime = (e.target.value / 100) * (audioEl.duration || 0);
    isSeeking = false;
  });
}

// ── Volume ────────────────────────────────────────────────
const volInput = document.getElementById('fp-volume');
if (volInput) {
  const saved = loadAudioState();
  if (saved?.volume != null) { audioEl.volume = saved.volume; volInput.value = saved.volume; }
  volInput.addEventListener('input', e => { audioEl.volume = e.target.value; saveAudioState(); });
}

// ── Audio events ──────────────────────────────────────────
audioEl.addEventListener('timeupdate', () => {
  updateSeekBar();
  if (Math.floor(audioEl.currentTime) % 5 === 0) saveAudioState();
});
audioEl.addEventListener('play', () => {
  $('fp-play-btn').textContent = '⏸'; $('sp-play-btn').textContent = '⏸';
  updateTracklistHighlight(); acquireWakeLock();
});
audioEl.addEventListener('pause', () => {
  $('fp-play-btn').textContent = '▶'; $('sp-play-btn').textContent = '▶';
  updateTracklistHighlight(); releaseWakeLock(); saveAudioState();
});
audioEl.addEventListener('ended', nextTrack);
audioEl.addEventListener('error', () => console.warn('Audio error:', audioEl.src));

// ── Media Session ─────────────────────────────────────────
function setupMediaSession(track) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: track.title, artist: track.artist || '',
    artwork: track.art ? [{ src: track.art, sizes:'512x512', type:'image/jpeg' }] : []
  });
  navigator.mediaSession.setActionHandler('play',          () => audioEl.play());
  navigator.mediaSession.setActionHandler('pause',         () => audioEl.pause());
  navigator.mediaSession.setActionHandler('nexttrack',     nextTrack);
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('seekbackward',  skipBack);
  navigator.mediaSession.setActionHandler('seekforward',   skipForward);
}

// ── Wake Lock ─────────────────────────────────────────────
async function acquireWakeLock() {
  if (!('wakeLock' in navigator) || wakeLock) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !audioEl.paused) acquireWakeLock();
});

// ── Persistence ───────────────────────────────────────────
function saveAudioState() {
  if (currentPlaylist < 0 || currentTrack < 0) return;
  const pl = playlists[currentPlaylist];
  try {
    localStorage.setItem(AUDIO_STORAGE_KEY, JSON.stringify({
      playlistName: pl?.name,
      trackTitle:   pl?.tracks[currentTrack]?.title,
      currentTime:  audioEl.currentTime,
      volume:       audioEl.volume
    }));
  } catch(e){}
}

function loadAudioState() {
  try { return JSON.parse(localStorage.getItem(AUDIO_STORAGE_KEY) || 'null'); } catch(e) { return null; }
}

function restoreAudioState() {
  const state = loadAudioState();
  if (!state || !playlists.length) return;
  const plIdx = playlists.findIndex(p => p.name === state.playlistName);
  if (plIdx < 0) return;
  const trIdx = playlists[plIdx].tracks.findIndex(t => t.title === state.trackTitle);
  if (trIdx < 0) return;
  currentPlaylist = plIdx; currentTrack = trIdx;
  const track = playlists[plIdx].tracks[trIdx];
  audioEl.src = track.url;
  audioEl.currentTime = state.currentTime || 0;
  if (state.volume != null) audioEl.volume = state.volume;
  updatePlayerUI(track);
  $('sticky-player').classList.remove('hidden');
  $('fp-play-btn').textContent = '▶';
  $('sp-play-btn').textContent = '▶';
}

// ── Helpers ───────────────────────────────────────────────
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  return `${m}:${String(Math.floor(s % 60)).padStart(2,'0')}`;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.onupdatefound = () => {
      const w = reg.installing;
      w.onstatechange = () => { if(w.state==='installed'&&navigator.serviceWorker.controller) if(confirm("גרסה חדשה זמינה! לרענן?")) location.reload(); };
    };
  });
}
